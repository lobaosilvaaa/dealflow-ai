name: DealFlowAI Deploy

on:
  push:
    branches:
      - main

# 🚀 Evita múltiplos deploys simultâneos
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:

  deploy:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:

      # 📦 Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🚀 Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: ${{ matrix.node-version }}

          cache: "npm"

      # 📊 Extrai dados do deploy
      - name: Extract Deploy Data
        id: data

        run: |

          echo "AUTHOR=${{ github.event.head_commit.author.name }}" >> $GITHUB_OUTPUT

          {
            echo "MESSAGE<<EOF"
            echo "${{ github.event.head_commit.message }}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

          echo "REPO=${{ github.repository }}" >> $GITHUB_OUTPUT

          echo "URL=${{ github.event.head_commit.url }}" >> $GITHUB_OUTPUT

      # ⏱️ Início pipeline
      - name: Start Timer

        run: |

          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      # 📦 Instala dependências
      - name: Install Dependencies

        run: npm ci

      # 🚀 Deploy iniciado
      - name: Notify Deploy Started

        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}

        run: |

          STARTED_AT=$(date '+%H:%M:%S')

          PAYLOAD=$(jq -n \
            --arg username "DealFlowAI Deploy" \
            --arg avatar_url "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png" \
            --arg title "🚀 Deploy Started" \
            --arg description "O deploy do DealFlowAI foi iniciado." \
            --arg branch "${{ steps.data.outputs.BRANCH }}" \
            --arg environment "PRODUCTION" \
            --arg workflow "deploy.yml" \
            --arg started_at "$STARTED_AT" \
            --arg author "${{ steps.data.outputs.AUTHOR }}" \
            --arg commit "${{ steps.data.outputs.MESSAGE }}" \
            --arg repo "${{ steps.data.outputs.REPO }}" \
            --arg url "${{ steps.data.outputs.URL }}" \
            --arg pipeline "${{ github.run_id }}" \
            '{
              username: $username,
              avatar_url: $avatar_url,

              embeds: [
                {
                  author: {
                    name: "DealFlowAI Deploy",
                    icon_url: $avatar_url
                  },

                  title: $title,
                  description: $description,
                  color: 16776960,
                  url: $url,

                  fields: [
                    {
                      name: "🌿 Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "🖥️ Environment",
                      value: $environment,
                      inline: true
                    },
                    {
                      name: "⚙️ Workflow",
                      value: $workflow,
                      inline: true
                    },
                    {
                      name: "🕒 Started At",
                      value: $started_at,
                      inline: true
                    },
                    {
                      name: "👤 Triggered By",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "🆔 Pipeline",
                      value: $pipeline,
                      inline: true
                    },
                    {
                      name: "📦 Repository",
                      value: $repo,
                      inline: true
                    },
                    {
                      name: "📦 Commit",
                      value: $commit,
                      inline: false
                    }
                  ],

                  footer: {
                    text: "DealFlowAI Deploy Pipeline"
                  }
                }
              ]
            }')

          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"

      # 🧪 Executa testes
      - name: Run Tests

        run: |

          echo "Running tests..."

          npm run test --if-present

      # 🏗️ Build aplicação
      - name: Run Build

        run: |

          echo "Building DealFlowAI..."

          npm run build --if-present

      # 🚀 Simula deploy
      - name: Simulate Deploy

        run: |

          echo "Deploying application..."

          sleep 5

      # ❤️ Healthcheck
      - name: Healthcheck

        run: |

          echo "Healthcheck validated"

      # ✅ Deploy sucesso
      - name: Notify Deploy Success

        if: success()

        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}

        run: |

          DURATION=$(( $(date +%s) - $START_TIME ))

          PAYLOAD=$(jq -n \
            --arg username "DealFlowAI Deploy" \
            --arg avatar_url "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png" \
            --arg title "✅ Deploy Successful" \
            --arg description "DealFlowAI implantado com sucesso." \
            --arg branch "${{ steps.data.outputs.BRANCH }}" \
            --arg environment "PRODUCTION" \
            --arg author "${{ steps.data.outputs.AUTHOR }}" \
            --arg commit "${{ steps.data.outputs.MESSAGE }}" \
            --arg duration "${DURATION}s" \
            --arg workflow "deploy.yml" \
            --arg repo "${{ steps.data.outputs.REPO }}" \
            --arg url "${{ steps.data.outputs.URL }}" \
            --arg pipeline "${{ github.run_id }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              username: $username,
              avatar_url: $avatar_url,

              embeds: [
                {
                  author: {
                    name: "DealFlowAI Deploy",
                    icon_url: $avatar_url
                  },

                  title: $title,
                  description: $description,
                  color: 5763719,
                  url: $url,

                  fields: [
                    {
                      name: "🌿 Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "🖥️ Environment",
                      value: $environment,
                      inline: true
                    },
                    {
                      name: "👤 Triggered By",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "⏱️ Duration",
                      value: $duration,
                      inline: true
                    },
                    {
                      name: "⚙️ Workflow",
                      value: $workflow,
                      inline: true
                    },
                    {
                      name: "🆔 Pipeline",
                      value: $pipeline,
                      inline: true
                    },
                    {
                      name: "📦 Repository",
                      value: $repo,
                      inline: true
                    },
                    {
                      name: "📦 Commit",
                      value: $commit,
                      inline: false
                    }
                  ],

                  footer: {
                    text: "DealFlowAI Deploy Pipeline"
                  },

                  timestamp: $timestamp
                }
              ]
            }')

          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"

      # ❌ Deploy falhou
      - name: Notify Deploy Failure

        if: failure()

        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}

        run: |

          DURATION=$(( $(date +%s) - $START_TIME ))

          PAYLOAD=$(jq -n \
            --arg username "DealFlowAI Deploy" \
            --arg avatar_url "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png" \
            --arg title "❌ Deploy Failed" \
            --arg description "O deploy do DealFlowAI falhou." \
            --arg branch "${{ steps.data.outputs.BRANCH }}" \
            --arg environment "PRODUCTION" \
            --arg duration "${DURATION}s" \
            --arg author "${{ steps.data.outputs.AUTHOR }}" \
            --arg commit "${{ steps.data.outputs.MESSAGE }}" \
            --arg repo "${{ steps.data.outputs.REPO }}" \
            --arg url "${{ steps.data.outputs.URL }}" \
            --arg pipeline "${{ github.run_id }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              username: $username,
              avatar_url: $avatar_url,

              embeds: [
                {
                  author: {
                    name: "DealFlowAI Deploy",
                    icon_url: $avatar_url
                  },

                  title: $title,
                  description: $description,
                  color: 15548997,
                  url: $url,

                  fields: [
                    {
                      name: "🌿 Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "🖥️ Environment",
                      value: $environment,
                      inline: true
                    },
                    {
                      name: "👤 Triggered By",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "⏱️ Duration",
                      value: $duration,
                      inline: true
                    },
                    {
                      name: "🆔 Pipeline",
                      value: $pipeline,
                      inline: true
                    },
                    {
                      name: "📦 Repository",
                      value: $repo,
                      inline: true
                    },
                    {
                      name: "📦 Commit",
                      value: $commit,
                      inline: false
                    }
                  ],

                  footer: {
                    text: "DealFlowAI Deploy Pipeline"
                  },

                  timestamp: $timestamp
                }
              ]
            }')

          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"