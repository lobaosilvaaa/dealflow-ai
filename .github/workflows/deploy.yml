name: DealFlowAI Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x .github/scripts/discord-webhook.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Notify Deploy Started
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          ./.github/scripts/discord-webhook.sh \
          "$DISCORD_DEPLOY_WEBHOOK" \
          "DealFlowAI Deploy" \
          "🚀 Deploy Started" \
          "O deploy do DealFlowAI foi iniciado." \
          16776960

      - name: Run Build
        run: |
          echo "Building DealFlowAI..."
          npm run build --if-present

      - name: Simulate Deploy
        run: |
          echo "Deploying application..."
          sleep 5

      - name: Notify Deploy Success
        if: success()
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          ./.github/scripts/discord-webhook.sh \
          "$DISCORD_DEPLOY_WEBHOOK" \
          "DealFlowAI Deploy" \
          "✅ Deploy Successful" \
          "DealFlowAI implantado com sucesso." \
          5763719

      - name: Notify Deploy Failed
        if: failure()
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          ./.github/scripts/discord-webhook.sh \
          "$DISCORD_DEPLOY_WEBHOOK" \
          "DealFlowAI Deploy" \
          "❌ Deploy Failed" \
          "O deploy do DealFlowAI falhou." \
          15548997