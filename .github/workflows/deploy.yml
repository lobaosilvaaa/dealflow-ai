name: DealFlowAI Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Notify Deploy Started
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d '{
            "username": "DealFlowAI Deploy",
            "avatar_url": "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/assets/LogoDealFlowAI.png",
            "embeds": [{
              "title": "🚀 Deploy Started",
              "description": "O deploy do DealFlowAI foi iniciado.",
              "color": 16776960
            }]
          }'

      - name: Run Build
        run: |
          echo "Building DealFlowAI..."
          npm run build --if-present

      - name: Simulate Deploy
        run: |
          echo "Deploying application..."
          sleep 5

      - name: Notify Deploy Success
        if: success()
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d '{
            "username": "DealFlowAI Deploy",
            "avatar_url": "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/assets/LogoDealFlowAI.png",
            "embeds": [{
              "title": "✅ Deploy Successful",
              "description": "DealFlowAI implantado com sucesso.",
              "color": 5763719
            }]
          }'

      - name: Notify Deploy Failed
        if: failure()
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d '{
            "username": "DealFlowAI Deploy",
            "avatar_url": "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/assets/LogoDealFlowAI.png",
            "embeds": [{
              "title": "❌ Deploy Failed",
              "description": "O deploy do DealFlowAI falhou.",
              "color": 15548997
            }]
          }'