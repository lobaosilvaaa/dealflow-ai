name: DealFlowAI Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract Deploy Data
        id: data
        run: |
          echo "AUTHOR=${{ github.event.head_commit.author.name }}" >> $GITHUB_OUTPUT
          echo "MESSAGE=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "REPO=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "URL=${{ github.event.head_commit.url }}" >> $GITHUB_OUTPUT

      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Install Dependencies
        run: npm install

      - name: Notify Deploy Started
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          PAYLOAD=$(jq -n \
            --arg username "DealFlowAI Deploy" \
            --arg avatar_url "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png" \
            --arg title "🚀 Deploy Started" \
            --arg description "O deploy do DealFlowAI foi iniciado." \
            --arg branch "${{ steps.data.outputs.BRANCH }}" \
            --arg author "${{ steps.data.outputs.AUTHOR }}" \
            --arg commit "${{ steps.data.outputs.MESSAGE }}" \
            '{
              username: $username,
              avatar_url: $avatar_url,

              embeds: [
                {
                  title: $title,
                  description: $description,
                  color: 16776960,

                  fields: [
                    {
                      name: "🌿 Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "👤 Triggered By",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "📦 Commit",
                      value: $commit,
                      inline: false
                    }
                  ],

                  footer: {
                    text: "DealFlowAI Deploy Pipeline"
                  }
                }
              ]
            }')

          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"

      - name: Run Build
        run: |
          echo "Building DealFlowAI..."
          npm run build --if-present

      - name: Simulate Deploy
        run: |
          echo "Deploying application..."
          sleep 5

      - name: Notify Deploy Success
        if: success()
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          DURATION=$(( $(date +%s) - $START_TIME ))

          PAYLOAD=$(jq -n \
            --arg username "DealFlowAI Deploy" \
            --arg avatar_url "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png" \
            --arg title "✅ Deploy Successful" \
            --arg description "DealFlowAI implantado com sucesso." \
            --arg branch "${{ steps.data.outputs.BRANCH }}" \
            --arg environment "production" \
            --arg author "${{ steps.data.outputs.AUTHOR }}" \
            --arg commit "${{ steps.data.outputs.MESSAGE }}" \
            --arg duration "${DURATION}s" \
            --arg workflow "deploy.yml" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              username: $username,
              avatar_url: $avatar_url,

              embeds: [
                {
                  title: $title,
                  description: $description,
                  color: 5763719,

                  fields: [
                    {
                      name: "🌿 Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "🖥️ Environment",
                      value: $environment,
                      inline: true
                    },
                    {
                      name: "👤 Triggered By",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "⏱️ Duration",
                      value: $duration,
                      inline: true
                    },
                    {
                      name: "⚙️ Workflow",
                      value: $workflow,
                      inline: true
                    },
                    {
                      name: "📦 Commit",
                      value: $commit,
                      inline: false
                    }
                  ],

                  footer: {
                    text: "DealFlowAI Deploy Pipeline"
                  },

                  timestamp: $timestamp
                }
              ]
            }')

          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"

      - name: Notify Deploy Failed
        if: failure()
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          DURATION=$(( $(date +%s) - $START_TIME ))

          PAYLOAD=$(jq -n \
            --arg username "DealFlowAI Deploy" \
            --arg avatar_url "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png" \
            --arg title "❌ Deploy Failed" \
            --arg description "O deploy do DealFlowAI falhou." \
            --arg branch "${{ steps.data.outputs.BRANCH }}" \
            --arg author "${{ steps.data.outputs.AUTHOR }}" \
            --arg commit "${{ steps.data.outputs.MESSAGE }}" \
            --arg duration "${DURATION}s" \
            --arg workflow "deploy.yml" \
            '{
              username: $username,
              avatar_url: $avatar_url,

              embeds: [
                {
                  title: $title,
                  description: $description,
                  color: 15548997,

                  fields: [
                    {
                      name: "🌿 Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "👤 Triggered By",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "⏱️ Duration",
                      value: $duration,
                      inline: true
                    },
                    {
                      name: "⚙️ Workflow",
                      value: $workflow,
                      inline: true
                    },
                    {
                      name: "📦 Commit",
                      value: $commit,
                      inline: false
                    }
                  ],

                  footer: {
                    text: "DealFlowAI Deploy Pipeline"
                  }
                }
              ]
            }')

          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"