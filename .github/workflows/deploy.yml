name: DealFlowAI Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract Deploy Data
        id: data
        run: |
          echo "AUTHOR=${{ github.event.head_commit.author.name }}" >> $GITHUB_OUTPUT
          echo "MESSAGE=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "REPO=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "URL=${{ github.event.head_commit.url }}" >> $GITHUB_OUTPUT

      - name: Install Dependencies
        run: npm install

      - name: Notify Deploy Started
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{
            \"username\": \"DealFlowAI Deploy\",
            \"avatar_url\": \"https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png\",
            \"embeds\": [{
              \"title\": \"🚀 Deploy Started\",
              \"description\": \"O deploy do DealFlowAI foi iniciado.\",
              \"color\": 16776960,
              \"fields\": [
                {
                  \"name\": \"🌿 Branch\",
                  \"value\": \"${{ steps.data.outputs.BRANCH }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"👤 Triggered By\",
                  \"value\": \"${{ steps.data.outputs.AUTHOR }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"📦 Commit\",
                  \"value\": \"${{ steps.data.outputs.MESSAGE }}\",
                  \"inline\": false
                }
              ],
              \"footer\": {
                \"text\": \"DealFlowAI Deploy Pipeline\"
              }
            }]
          }"

      - name: Run Build
        run: |
          echo "Building DealFlowAI..."
          npm run build --if-present

      - name: Simulate Deploy
        run: |
          echo "Deploying application..."
          sleep 5

      - name: Notify Deploy Success
        if: success()
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{
            \"username\": \"DealFlowAI Deploy\",
            \"avatar_url\": \"https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png\",
            \"embeds\": [{
              \"title\": \"✅ Deploy Successful\",
              \"description\": \"DealFlowAI implantado com sucesso.\",
              \"color\": 5763719,
              \"fields\": [
                {
                  \"name\": \"🌿 Branch\",
                  \"value\": \"${{ steps.data.outputs.BRANCH }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"🖥️ Environment\",
                  \"value\": \"production\",
                  \"inline\": true
                },
                {
                  \"name\": \"👤 Triggered By\",
                  \"value\": \"${{ steps.data.outputs.AUTHOR }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"📦 Commit\",
                  \"value\": \"${{ steps.data.outputs.MESSAGE }}\",
                  \"inline\": false
                }
              ],
              \"footer\": {
                \"text\": \"DealFlowAI Deploy Pipeline\"
              },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }"

      - name: Notify Deploy Failed
        if: failure()
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_DEPLOY_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{
            \"username\": \"DealFlowAI Deploy\",
            \"avatar_url\": \"https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png\",
            \"embeds\": [{
              \"title\": \"❌ Deploy Failed\",
              \"description\": \"O deploy do DealFlowAI falhou.\",
              \"color\": 15548997,
              \"fields\": [
                {
                  \"name\": \"🌿 Branch\",
                  \"value\": \"${{ steps.data.outputs.BRANCH }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"👤 Triggered By\",
                  \"value\": \"${{ steps.data.outputs.AUTHOR }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"📦 Commit\",
                  \"value\": \"${{ steps.data.outputs.MESSAGE }}\",
                  \"inline\": false
                }
              ],
              \"footer\": {
                \"text\": \"DealFlowAI Deploy Pipeline\"
              }
            }]
          }"