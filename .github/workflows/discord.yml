name: Discord Logs

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract Data
        id: data
        run: |
          echo "MESSAGE=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo "AUTHOR=${{ github.event.head_commit.author.name }}" >> $GITHUB_OUTPUT
          echo "REPO=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "URL=${{ github.event.head_commit.url }}" >> $GITHUB_OUTPUT
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

          FILES=$(git diff --name-only HEAD^ HEAD | wc -l)

          FILE_LIST=$(git diff --name-only HEAD^ HEAD | awk '{print "• " $0}' | head -5)

          echo "FILES=$FILES" >> $GITHUB_OUTPUT

          {
            echo "FILE_LIST<<EOF"
            echo "$FILE_LIST"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        env:
          DISCORD_COMMIT_WEBHOOK: ${{ secrets.DISCORD_COMMIT_WEBHOOK }}
        run: |
          MESSAGE="${{ steps.data.outputs.MESSAGE }}"

          COLOR=5814783
          TYPE="📦 Commit"

          if [[ "$MESSAGE" == feat* ]]; then
            COLOR=5763719
            TYPE="✨ Feature"
          elif [[ "$MESSAGE" == fix* ]]; then
            COLOR=15548997
            TYPE="🐛 Fix"
          elif [[ "$MESSAGE" == refactor* ]]; then
            COLOR=16776960
            TYPE="♻️ Refactor"
          elif [[ "$MESSAGE" == docs* ]]; then
            COLOR=3447003
            TYPE="📝 Docs"
          elif [[ "$MESSAGE" == chore* ]]; then
            COLOR=9807270
            TYPE="🛠️ Chore"
          fi

          PAYLOAD=$(jq -n \
            --arg username "DealFlowAI Logs" \
            --arg avatar_url "https://raw.githubusercontent.com/lobaosilvaaa/dealflow-ai/main/src/assets/LogoDealFlowAI.png" \
            --arg title "🚀 Novo Commit - DealFlowAI" \
            --arg description "$MESSAGE" \
            --arg url "${{ steps.data.outputs.URL }}" \
            --arg type "$TYPE" \
            --arg author "${{ steps.data.outputs.AUTHOR }}" \
            --arg branch "${{ steps.data.outputs.BRANCH }}" \
            --arg files "${{ steps.data.outputs.FILES }} alterados" \
            --arg file_list "${{ steps.data.outputs.FILE_LIST }}" \
            --arg repo "${{ steps.data.outputs.REPO }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson color "$COLOR" \
            '{
              username: $username,
              avatar_url: $avatar_url,
              embeds: [
                {
                  title: $title,
                  description: $description,
                  color: $color,
                  url: $url,

                  fields: [
                    {
                      name: "📌 Tipo",
                      value: $type,
                      inline: true
                    },
                    {
                      name: "👤 Autor",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "🌿 Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "📁 Arquivos",
                      value: $files,
                      inline: true
                    },
                    {
                      name: "📄 Alterações",
                      value: $file_list,
                      inline: false
                    },
                    {
                      name: "📦 Repositório",
                      value: $repo,
                      inline: false
                    }
                  ],

                  footer: {
                    text: "DealFlowAI Commit Logs"
                  },

                  timestamp: $timestamp
                }
              ]
            }')

          curl -X POST "$DISCORD_COMMIT_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"