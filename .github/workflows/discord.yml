name: Discord Logs

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract Data
        id: data
        run: |
          echo "MESSAGE=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo "AUTHOR=${{ github.event.head_commit.author.name }}" >> $GITHUB_OUTPUT
          echo "REPO=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "URL=${{ github.event.head_commit.url }}" >> $GITHUB_OUTPUT
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

          FILES=$(git diff --name-only HEAD^ HEAD | wc -l)

          FILE_LIST=$(git diff --name-only HEAD^ HEAD | awk '{print "• " $0}' | head -5)

          echo "FILES=$FILES" >> $GITHUB_OUTPUT

          {
            echo "FILE_LIST<<EOF"
            echo "$FILE_LIST"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        env:
          DISCORD_COMMIT_WEBHOOK: ${{ secrets.DISCORD_COMMIT_WEBHOOK }}
        run: |
          MESSAGE="${{ steps.data.outputs.MESSAGE }}"

          COLOR=5814783
          TYPE="📦 Commit"

          if [[ "$MESSAGE" == feat* ]]; then
            COLOR=5763719
            TYPE="✨ Feature"
          elif [[ "$MESSAGE" == fix* ]]; then
            COLOR=15548997
            TYPE="🐛 Fix"
          elif [[ "$MESSAGE" == refactor* ]]; then
            COLOR=16776960
            TYPE="♻️ Refactor"
          elif [[ "$MESSAGE" == docs* ]]; then
            COLOR=3447003
            TYPE="📝 Docs"
          elif [[ "$MESSAGE" == chore* ]]; then
            COLOR=9807270
            TYPE="🛠️ Chore"
          fi

          curl -X POST $DISCORD_COMMIT_WEBHOOK \
          -H "Content-Type: application/json" \
          -d "{
            \"username\": \"DealFlowAI Logs\",
            \"embeds\": [{
              \"title\": \"🚀 Novo Commit - DealFlowAI\",
              \"description\": \"$MESSAGE\",
              \"color\": $COLOR,
              \"url\": \"${{ steps.data.outputs.URL }}\",
              \"fields\": [
                {
                  \"name\": \"📌 Tipo\",
                  \"value\": \"$TYPE\",
                  \"inline\": true
                },
                {
                  \"name\": \"👤 Autor\",
                  \"value\": \"${{ steps.data.outputs.AUTHOR }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"🌿 Branch\",
                  \"value\": \"${{ steps.data.outputs.BRANCH }}\",
                  \"inline\": true
                },
                {
                  \"name\": \"📁 Arquivos\",
                  \"value\": \"${{ steps.data.outputs.FILES }} alterados\",
                  \"inline\": true
                },
                {
                  \"name\": \"📄 Alterações\",
                  \"value\": \"${{ steps.data.outputs.FILE_LIST }}\",
                  \"inline\": false
                },
                {
                  \"name\": \"📦 Repositório\",
                  \"value\": \"${{ steps.data.outputs.REPO }}\",
                  \"inline\": false
                }
              ],
              \"footer\": {
                \"text\": \"DealFlowAI Commit Logs\"
              },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }"